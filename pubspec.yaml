name: quran_offline
description: Quran Offline is a simple, fast, and distraction-free Qur’an reading app designed for all ages
publish_to: 'none'
version: 1.0.3+27

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  flutter_riverpod: ^2.5.1
  
  # Database
  drift: ^2.14.1
  sqlite3_flutter_libs: ^0.5.18
  path_provider: ^2.1.2
  path: ^1.8.3
  
  # JSON & Async
  json_annotation: ^4.8.1
  
  # Share
  share_plus: ^7.2.1
  
  # URL Launcher
  url_launcher: ^6.2.5
  
  # Utilities
  shared_preferences: ^2.2.2
  package_info_plus: ^8.0.0
  
  # Scroll to item
  scrollable_positioned_list: ^0.3.8

  # Audio recitation
  just_audio: ^0.10.5
  just_audio_background: ^0.0.1-beta.17
  audio_session: ^0.2.3
  http: ^1.6.0
  hijri: ^3.0.1
  sqflite: ^2.4.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.7
  drift_dev: ^2.14.1
  json_serializable: ^6.7.1
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.3.10

flutter:
  uses-material-design: true
  
  assets:
    - assets/quran/
    - assets/quran/surah_names/
    - assets/fonts/
    - assets/icon/
    - assets/icon/nav_read_quran.png
    - assets/icon/nav_read_quran_active.png
    - assets/icon/nav_read_quran.svg
    - assets/duas/duas_catalog.json
    - assets/science/science_catalog.json
    - assets/themes/life_themes_catalog.json
    - assets/reflection/calendar_lenses_catalog.json
    - assets/reflection/weekly_rotation_catalog.json
    - assets/asma/
    - assets/quran/surah_info/en_surah_info.sqlite
    - assets/quran/surah_info/id_surah_info.sqlite
    - assets/tafsir/id_as_saadi.sqlite
    - assets/tafsir/en_ibn_kathir.sqlite
    - assets/tafsir/zh_mokhtasar.sqlite
    - assets/tafsir/ja_mokhtasar.sqlite
  
  fonts:
    - family: UthmanicHafsV22
      fonts:
        - asset: assets/fonts/uthmanic_hafs_v22.ttf
    - family: UthmanicHafs
      fonts:
        - asset: assets/fonts/uthmanic_hafs_v22.ttf
    - family: KFGQPCUthmanic
      fonts:
        - asset: assets/fonts/KFGQPC Uthmanic Script HAFS Regular.otf
    - family: ScheherazadeNew
      fonts:
        - asset: assets/fonts/ScheherazadeNew-Regular.ttf
    - family: SurahNameV2
      fonts:
        - asset: assets/fonts/surah_name_v2.ttf

flutter_native_splash:
  image: assets/icon/splash_icon.png
  color: "#FFFFFF"
  color_dark: "#121212"
  android_12:
    image: assets/icon/splash_icon.png
    color: "#FFFFFF"
    color_dark: "#121212"
  android: true
  ios: true
  fullscreen: true

flutter_launcher_icons:
  ios: true
  image_path_ios: "assets/icon/app_icon_1024.png"
  android: true
  image_path_android: "assets/icon/app_icon_1024.png"
  min_sdk_android: 21
  adaptive_icon_background: "#E8EDE3"
  adaptive_icon_foreground: "assets/icon/app_icon_foreground.png"

